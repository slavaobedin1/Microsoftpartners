  { sku:"DG7GMGF0HL59:0001-C", group:"Office 2024", desc:"Project Standard 2024", partnerPrice:769.99 },
  { sku:"DG7GMGF0HL58:0001-C", group:"Office 2024", desc:"Project Professional 2024", partnerPrice:1159.99 },
  { sku:"DG7GMGF0HGCP:0001-C", group:"Exchange Server 2019", desc:"Exchange Server 2019 Standard", partnerPrice:838.98 },
  { sku:"DG7GMGF0HGCP:0002-C", group:"Exchange Server 2019", desc:"Exchange Server 2019 Enterprise", partnerPrice:4699.17 },
];

// ── PERPETUAL EDUCATION ────────────────────────────────────────────────────────
const PERP_EDU = [
  { sku:"DG7GMGF0HL4H:0003-C", group:"Office 2024 Education", desc:"Office LTSC Standard 2024 Education Faculty", partnerPrice:195.61 },
  { sku:"DG7GMGF0HL4H:0004-C", group:"Office 2024 Education", desc:"Office LTSC Standard 2024 Education Student", partnerPrice:65.20 },
  { sku:"DG7GMGF0PWHC:0007-C", group:"Windows Server 2025 Edu", desc:"Windows Server 2025 Standard - 16 Core Edu", partnerPrice:859.44 },
  { sku:"DG7GMGF0PWHD:0005-C", group:"Windows Server 2025 Edu", desc:"Windows Server 2025 Datacenter - 16 Core Edu", partnerPrice:4944.79 },
];

// ── HELPER ─────────────────────────────────────────────────────────────────────
const fmt = (n) => n == null || n === "" ? "" : "$" + Number(n).toFixed(2);
const dp = (price, discPct) => price * (1 - discPct / 100);

// ── APP ────────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("resellers");
  const [resellers, setResellers] = useState(() => {
    try { const s = localStorage.getItem("ms_resellers"); return s ? JSON.parse(s) : DEFAULT_RESELLERS; } catch { return DEFAULT_RESELLERS; }
  });
  const [consumption, setConsumption] = useState(() => {
    try { const s = localStorage.getItem("ms_consumption"); return s ? JSON.parse(s) : {}; } catch { return {}; }
  });

  useEffect(() => { try { localStorage.setItem("ms_resellers", JSON.stringify(resellers)); } catch {} }, [resellers]);
  useEffect(() => { try { localStorage.setItem("ms_consumption", JSON.stringify(consumption)); } catch {} }, [consumption]);

  // resellers tab state
  const [search, setSearch] = useState("");
  const [sel, setSel] = useState(null);
  const [editMode, setEditMode] = useState(false);
  const [editData, setEditData] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [newRes, setNewRes] = useState({ name:"", nameHe:"", id:"", discount:12.5, phone:"", email:"", address:"" });

  // price tab state
  const [priceType, setPriceType] = useState("corp"); // corp | edu
  const [priceModel, setPriceModel] = useState("annual"); // annual | monthly | mthly
  const [priceSearch, setPriceSearch] = useState("");
  const [selResForPrice, setSelResForPrice] = useState("");

  // perpetual tab state
  const [perpType, setPerpType] = useState("corp");
  const [perpSearch, setPerpSearch] = useState("");
  const [selResForPerp, setSelResForPerp] = useState("");
  const [perpExtraDisc, setPerpExtraDisc] = useState(0);

  // calculator tab state
  const [calcItems, setCalcItems] = useState([{ type:"cloud", sku:"", qty:1 }]);
  const [calcRes, setCalcRes] = useState("");
  const [calcModel, setCalcModel] = useState("annual");
  const [perpCalcItems, setPerpCalcItems] = useState([{ sku:"", qty:1 }]);
  const [perpCalcExtraDisc, setPerpCalcExtraDisc] = useState(0);
  const [perpCalcRes, setPerpCalcRes] = useState("");

  // consumption tab state
  const [consMonth, setConsMonth] = useState(() => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; });
  const [prevMonth, setPrevMonth] = useState(() => { const d=new Date(); d.setMonth(d.getMonth()-1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; });
  const [consSearch, setConsSearch] = useState("");

  const filtered = useMemo(() => resellers.filter(r =>
    r.name.toLowerCase().includes(search.toLowerCase()) ||
    (r.nameHe||"").includes(search) ||
    r.id.includes(search) ||
    (r.address||"").includes(search)
  ), [resellers, search]);

  const cloudList = priceType === "corp" ? CLOUD_CORP : CLOUD_EDU;
  const filteredCloud = useMemo(() => cloudList.filter(p =>
    p.desc.toLowerCase().includes(priceSearch.toLowerCase()) || p.sku.includes(priceSearch)
  ), [cloudList, priceSearch]);

  const perpList = perpType === "corp" ? PERP_CORP : PERP_EDU;
  const filteredPerp = useMemo(() => perpList.filter(p =>
    p.desc.toLowerCase().includes(perpSearch.toLowerCase()) || (p.group||"").toLowerCase().includes(perpSearch.toLowerCase()) || p.sku.includes(perpSearch)
  ), [perpList, perpSearch]);

  const getDiscForRes = (resId, list) => {
    const r = resellers.find(x => x.id === resId);
    return r ? r.discount : 12.5;
  };

  const getCloudPrice = (product, model, discPct) => {
    if (model === "annual") return { partner: dp(product.annualE, discPct), endUser: product.annualE };
    if (model === "monthly") return { partner: dp(product.monthlyE, discPct), endUser: product.monthlyE };
    return { partner: dp(product.mthlyE, discPct), endUser: product.mthlyE };
  };

  const getPerpPrice = (product, extraDisc) => {
    const myPrice = dp(product.partnerPrice, 2); // 2% off partner price
    const withExtra = extraDisc > 0 ? dp(myPrice, extraDisc) : myPrice;
    return { myPrice: withExtra, endUser: product.partnerPrice };
  };

  const getConsVal = (id, month) => consumption[`${id}_${month}`] || "";
  const setConsVal = (id, month, val) => setConsumption(p => ({ ...p, [`${id}_${month}`]: val }));

  const consFiltered = useMemo(() => resellers.filter(r =>
    r.name.toLowerCase().includes(consSearch.toLowerCase()) || (r.nameHe||"").includes(consSearch)
  ), [resellers, consSearch]);

  // Cloud calculator total
  const cloudCalcTotal = useMemo(() => {
    const disc = calcRes ? getDiscForRes(calcRes) : 12.5;
    return calcItems.reduce((sum, item) => {
      if (!item.sku) return sum;
      const allCloud = [...CLOUD_CORP, ...CLOUD_EDU];
      const prod = allCloud.find(p => p.sku === item.sku);
      if (!prod) return sum;
      const { partner } = getCloudPrice(prod, calcModel, disc);
      return sum + partner * Number(item.qty || 1);
    }, 0);
  }, [calcItems, calcRes, calcModel, resellers]);

  // Perp calculator total
  const perpCalcTotal = useMemo(() => {
    const allPerp = [...PERP_CORP, ...PERP_EDU];
    return perpCalcItems.reduce((sum, item) => {
      if (!item.sku) return sum;
      const prod = allPerp.find(p => p.sku === item.sku);
      if (!prod) return sum;
      const { myPrice } = getPerpPrice(prod, perpCalcExtraDisc);
      return sum + myPrice * Number(item.qty || 1);
    }, 0);
  }, [perpCalcItems, perpCalcExtraDisc]);

  const tabs = [
    { id:"resellers", label:"👥 משווקים" },
    { id:"cloud", label:"☁️ מחירון Cloud" },
    { id:"perp", label:"📦 מחירון Perpetual" },
    { id:"calc", label:"🧮 מחשבון" },
    { id:"consumption", label:"📊 צריכה" },
  ];

  const S = { // styles
    card: { background:"#fff", borderRadius:12, border:"1px solid #e0e7ff", padding:"12px 14px", marginBottom:8 },
    btn: (color="#0078d4") => ({ background:color, color:"#fff", border:"none", borderRadius:6, padding:"7px 14px", cursor:"pointer", fontSize:13, fontWeight:"bold" }),
    btnSm: (color="#0078d4") => ({ background:color, color:"#fff", border:"none", borderRadius:5, padding:"4px 10px", cursor:"pointer", fontSize:12 }),
    input: { width:"100%", padding:"8px 10px", border:"1px solid #c7d2fe", borderRadius:7, fontSize:13, boxSizing:"border-box" },
    label: { fontSize:12, color:"#555", marginBottom:3, display:"block" },
    badge: (c="#dbeafe") => ({ background:c, borderRadius:12, padding:"2px 8px", fontSize:11, fontWeight:"bold" }),
  };

  return (
    <div style={{ minHeight:"100vh", background:"#f0f4ff" }}>

        <div>

          <div style={{ fontSize:11, opacity:0.8 }}>CMS Compucenter</div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ background:"#fff", borderBottom:"1px solid #e0e7ff", overflowX:"auto", display:"flex" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            border:"none", background:"none", padding:"10px 14px", cursor:"pointer",
            fontWeight: tab===t.id ? "bold" : "normal",
            borderBottom: tab===t.id ? "3px solid #0078d4" : "3px solid transparent",
            color: tab===t.id ? "#0078d4" : "#444",
            whiteSpace:"nowrap", fontSize:13
          }}>{t.label}</button>
        ))}
      </div>

      <div style={{ padding:12, maxWidth:900, margin:"0 auto" }}>

        {/* ─── RESELLERS TAB ─── */}
        {tab==="resellers" && !sel && (
          <div>
            <div style={{ display:"flex", gap:8, marginBottom:10 }}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חפש שם, מספר, כתובת..." style={{ ...S.input, flex:1 }} />
              <button onClick={() => setShowAdd(true)} style={S.btn()}>+ הוסף</button>
            </div>

            {showAdd && (
              <div style={{ ...S.card, background:"#eff6ff", marginBottom:12 }}>
                <div style={{ fontWeight:"bold", marginBottom:8, color:"#1e40af" }}>➕ הוסף משווק חדש</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                  {[["שם באנגלית","name"],["שם בעברית","nameHe"],["מספר משווק","id"],["אחוז הנחה","discount"],["טלפון","phone"],["אימייל","email"]].map(([lbl,key]) => (
                    <div key={key}>
                      <span style={S.label}>{lbl}</span>
                      <input style={S.input} value={newRes[key]} onChange={e=>setNewRes(p=>({...p,[key]:e.target.value}))} type={key==="discount"?"number":"text"} />
                    </div>
                  ))}
                  <div style={{ gridColumn:"1/-1" }}>
                    <span style={S.label}>כתובת</span>
                    <input style={S.input} value={newRes.address} onChange={e=>setNewRes(p=>({...p,address:e.target.value}))} />
                  </div>
                </div>
                <div style={{ display:"flex", gap:8, marginTop:10 }}>
                  <button style={S.btn()} onClick={() => {
                    if (!newRes.name || !newRes.id) return alert("שם ומספר משווק חובה");
                    setResellers(p => [...p, { ...newRes, discount: parseFloat(newRes.discount)||12.5 }]);
                    setNewRes({ name:"", nameHe:"", id:"", discount:12.5, phone:"", email:"", address:"" });
                    setShowAdd(false);
                  }}>שמור</button>
                  <button style={S.btn("#6b7280")} onClick={() => setShowAdd(false)}>ביטול</button>

            {filtered.map(r => (
              <div key={r.id} onClick={() => { setSel(r); setEditMode(false); }}

                  <div style={{ fontWeight:"bold", color:"#1e40af" }}>{r.name}</div>
                  {r.nameHe && <div style={{ fontSize:12, color:"#555" }}>{r.nameHe}</div>}

                  </div>
                </div>
                <div style={{ color:"#0078d4", fontSize:18 }}>›</div>
              </div>
            ))}
          </div>
        )}

        {tab==="resellers" && sel && !editMode && (
          <div>

                <span style={{ ...S.badge("#dcfce7"), color:"#166534", fontSize:15, padding:"3px 12px" }}>{sel.discount}%</span>
              </div>
              {sel.phone && <div style={{ marginBottom:6 }}><a href={`tel:${sel.phone}`} style={{ color:"#0078d4", textDecoration:"none" }}>📞 {sel.phone}</a></div>}
              {sel.email && <div style={{ marginBottom:6 }}><a href={`mailto:${sel.email}`} style={{ color:"#0078d4", textDecoration:"none" }}>✉️ {sel.email}</a></div>}
              {sel.address && <div style={{ fontSize:13, color:"#555" }}>📍 {sel.address}</div>}
              <div style={{ display:"flex", gap:8, marginTop:12 }}>
                <button style={S.btn()} onClick={() => { setEditData({...sel}); setEditMode(true); }}>✏️ עריכה</button>

                  if (window.confirm(`למחוק את ${sel.name}?`)) { setResellers(p=>p.filter(r=>r.id!==sel.id)); setSel(null); }

            </div>
          </div>

        {tab==="resellers" && sel && editMode && editData && (

                {[["שם באנגלית","name"],["שם בעברית","nameHe"],["מספר משווק","id"],["אחוז הנחה","discount"],["טלפון","phone"],["אימייל","email"]].map(([lbl,key]) => (
                  <div key={key}>

                  <span style={S.label}>כתובת</span>
                  <input style={S.input} value={editData.address||""} onChange={e=>setEditData(p=>({...p,address:e.target.value}))} />

              </select>
              <select value={priceModel} onChange={e=>setPriceModel(e.target.value)} style={{ ...S.input, width:"auto", flex:"0 0 auto" }}>
                <option value="annual">שנתי/שנתי</option>
                <option value="monthly">שנתי/חודשי</option>

            <input value={priceSearch} onChange={e=>setPriceSearch(e.target.value)} placeholder="🔍 חפש מוצר..." style={{ ...S.input, marginBottom:10 }} />
            <div style={{ overflowX:"auto" }}>

                    return (
                      <tr key={p.sku} style={{ background:i%2===0?"#f8fafc":"#fff", borderBottom:"1px solid #e2e8f0" }}>
                        <td style={{ padding:"6px 10px" }}>

                </tbody>
              </table>
            </div>
          </div>

              {calcItems.map((item, idx) => {
                const allCloud = [...CLOUD_CORP, ...CLOUD_EDU];
                const prod = allCloud.find(p => p.sku === item.sku);
                const disc = calcRes ? getDiscForRes(calcRes) : 12.5;
                const price = prod ? getCloudPrice(prod, calcModel, disc).partner : null;
                return (
                  <div key={idx} style={{ display:"flex", gap:6, marginBottom:6, alignItems:"center" }}>
                    <select value={item.sku} onChange={e=>setCalcItems(p=>p.map((x,i)=>i===idx?{...x,sku:e.target.value}:x))}
                      style={{ ...S.input, flex:3 }}>
                      <option value="">— בחר מוצר —</option>
                      <optgroup label="Corporate">
                        {CLOUD_CORP.map(p => <option key={p.sku} value={p.sku}>{p.desc}</option>)}
                      </optgroup>
                      <optgroup label="Education">
                        {CLOUD_EDU.map(p => <option key={p.sku} value={p.sku}>{p.desc}</option>)}
                      </optgroup>
                    </select>
                    <input type="number" min="1" value={item.qty} onChange={e=>setCalcItems(p=>p.map((x,i)=>i===idx?{...x,qty:e.target.value}:x))}
                      style={{ ...S.input, width:60, flex:"0 0 60px" }} placeholder="כמות" />
                    {price != null && <span style={{ fontSize:12, color:"#166534", fontWeight:"bold", whiteSpace:"nowrap" }}>{fmt(price * Number(item.qty||1))}</span>}
                    <button onClick={()=>setCalcItems(p=>p.filter((_,i)=>i!==idx))} style={{ ...S.btnSm("#dc2626"), flex:"0 0 auto" }}>✕</button>
                  </div>
                );
              })}
              <div style={{ display:"flex", gap:8, alignItems:"center", marginTop:6 }}>
                <button style={S.btnSm()} onClick={()=>setCalcItems(p=>[...p,{sku:"",qty:1}])}>+ הוסף שורה</button>
                <div style={{ marginRight:"auto", fontWeight:"bold", color:"#0078d4", fontSize:15 }}>
                  סה"כ: {fmt(cloudCalcTotal)}
                </div>
              </div>
            </div>

            {/* Perpetual Calculator */}
            <div style={S.card}>
              <div style={{ fontWeight:"bold", color:"#6d28d9", marginBottom:10, fontSize:15 }}>📦 מחשבון Perpetual</div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10, alignItems:"center" }}>
                <select value={perpCalcRes} onChange={e=>setPerpCalcRes(e.target.value)} style={{ ...S.input, flex:1, minWidth:150 }}>
                  <option value="">— בחר משווק (אופציונלי) —</option>
                  {resellers.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                </select>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:12, whiteSpace:"nowrap" }}>הנחה נוספת:</span>
                  <input type="number" min="0" max="50" value={perpCalcExtraDisc} onChange={e=>setPerpCalcExtraDisc(Number(e.target.value))}
                    style={{ ...S.input, width:60 }} />
                  <span style={{ fontSize:12 }}>%</span>
                </div>
              </div>
              {perpCalcItems.map((item, idx) => {
                const allPerp = [...PERP_CORP, ...PERP_EDU];
                const prod = allPerp.find(p => p.sku === item.sku);
                const price = prod ? getPerpPrice(prod, perpCalcExtraDisc).myPrice : null;
                return (
                  <div key={idx} style={{ display:"flex", gap:6, marginBottom:6, alignItems:"center" }}>
                    <select value={item.sku} onChange={e=>setPerpCalcItems(p=>p.map((x,i)=>i===idx?{...x,sku:e.target.value}:x))}
                      style={{ ...S.input, flex:3 }}>
                      <option value="">— בחר מוצר —</option>
                      <optgroup label="Corporate">
                        {PERP_CORP.map(p => <option key={p.sku} value={p.sku}>{p.desc}</option>)}
                      </optgroup>
                      <optgroup label="Education">
                        {PERP_EDU.map(p => <option key={p.sku} value={p.sku}>{p.desc}</option>)}
                      </optgroup>
                    </select>
                    <input type="number" min="1" value={item.qty} onChange={e=>setPerpCalcItems(p=>p.map((x,i)=>i===idx?{...x,qty:e.target.value}:x))}
                      style={{ ...S.input, width:60, flex:"0 0 60px" }} placeholder="כמות" />
                    {price != null && <span style={{ fontSize:12, color:"#166534", fontWeight:"bold", whiteSpace:"nowrap" }}>{fmt(price * Number(item.qty||1))}</span>}
                    <button onClick={()=>setPerpCalcItems(p=>p.filter((_,i)=>i!==idx))} style={{ ...S.btnSm("#dc2626"), flex:"0 0 auto" }}>✕</button>
                  </div>
                );
              })}
              <div style={{ display:"flex", gap:8, alignItems:"center", marginTop:6 }}>
                <button style={S.btnSm("#6d28d9")} onClick={()=>setPerpCalcItems(p=>[...p,{sku:"",qty:1}])}>+ הוסף שורה</button>
                <div style={{ marginRight:"auto", fontWeight:"bold", color:"#6d28d9", fontSize:15 }}>
                  סה"כ: {fmt(perpCalcTotal)}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ─── CONSUMPTION TAB ─── */}
        {tab==="consumption" && (
          <div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
              <div>
                <span style={S.label}>חודש נוכחי</span>
                <input type="month" value={consMonth} onChange={e=>setConsMonth(e.target.value)} style={S.input} />
              </div>
              <div>
                <span style={S.label}>חודש קודם</span>
                <input type="month" value={prevMonth} onChange={e=>setPrevMonth(e.target.value)} style={S.input} />
              </div>
            </div>
            <input value={consSearch} onChange={e=>setConsSearch(e.target.value)} placeholder="🔍 חפש משווק..." style={{ ...S.input, marginBottom:10 }} />
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", background:"#fff", borderRadius:8, fontSize:12 }}>
                <thead>
                  <tr style={{ background:"#0078d4", color:"#fff" }}>
                    <th style={{ padding:"8px 10px", textAlign:"right" }}>משווק</th>
                    <th style={{ padding:"8px", textAlign:"center", minWidth:110 }}>חודש קודם</th>
                    <th style={{ padding:"8px", textAlign:"center", minWidth:110 }}>חודש נוכחי</th>
                    <th style={{ padding:"8px", textAlign:"center", minWidth:80 }}>שינוי</th>
                  </tr>
                </thead>
                <tbody>
                  {consFiltered.map((r,i) => {
                    const prev = parseFloat(getConsVal(r.id, prevMonth)) || 0;
                    const curr = parseFloat(getConsVal(r.id, consMonth)) || 0;
                    const diff = curr - prev;
                    const pct = prev > 0 ? ((diff/prev)*100).toFixed(0) : null;
                    return (
                      <tr key={r.id} style={{ background:i%2===0?"#f8fafc":"#fff", borderBottom:"1px solid #e2e8f0" }}>
                        <td style={{ padding:"6px 10px" }}>
                          <div style={{ fontWeight:"bold" }}>{r.name}</div>
                          {r.nameHe && <div style={{ fontSize:11, color:"#777" }}>{r.nameHe}</div>}
                          <div style={{ fontSize:10, color:"#aaa" }}>#{r.id}</div>
                        </td>
                        <td style={{ padding:"4px 6px", textAlign:"center" }}>
                          <input type="number" value={getConsVal(r.id, prevMonth)} onChange={e=>setConsVal(r.id, prevMonth, e.target.value)}
                            placeholder="0" style={{ width:90, padding:4, border:"1px solid #d1d5db", borderRadius:4, textAlign:"center", fontSize:12 }} />
                        </td>
                        <td style={{ padding:"4px 6px", textAlign:"center" }}>
                          <input type="number" value={getConsVal(r.id, consMonth)} onChange={e=>setConsVal(r.id, consMonth, e.target.value)}
                            placeholder="0" style={{ width:90, padding:4, border:"1px solid #d1d5db", borderRadius:4, textAlign:"center", fontSize:12 }} />
                        </td>
                        <td style={{ padding:"4px 6px", textAlign:"center" }}>
                          {(prev > 0 || curr > 0) && (
                            <span style={{ color: diff>0?"#059669":diff<0?"#dc2626":"#888", fontWeight:"bold" }}>
                              {diff>0?"▲":diff<0?"▼":"➡"} {Math.abs(diff).toFixed(0)}{pct ? ` (${pct}%)` : ""}
                            </span>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
