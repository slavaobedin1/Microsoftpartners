<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0078d4" />
  <meta name="description" content="מנהל משווקים Microsoft - CMS Compucenter" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MS Partners" />

  <title>MS Partners Manager</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f4ff; }
    #root { min-height: 100vh; }
    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh;
      background: linear-gradient(135deg, #0078d4, #106ebe);
      color: white; font-family: Arial, sans-serif;
    }
    #loading .logo { font-size: 48px; margin-bottom: 16px; }
    #loading .title { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
    #loading .sub { font-size: 13px; opacity: 0.75; }
    #loading .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-top: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">🏢</div>
    <div class="title">MS Partners Manager</div>
    <div class="sub">CMS Compucenter · Slava Obedin</div>
    <div class="spinner"></div>
  </div>

  <div id="root"></div>

  <!-- React + ReactDOM (production) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone for JSX (or swap for a build tool) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <!-- Load the app -->
  <script type="text/babel" data-type="module" src="ResellersApp.jsx"></script>

  <script>
    // Remove loading screen once React mounts
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
      }, 800);
    });

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>

  <script type="text/babel">
    // Mount React app
    const container = document.getElementById('root');
    const rootEl = ReactDOM.createRoot(container);
    rootEl.render(React.createElement(App));
  </script>
</body>
</html>
