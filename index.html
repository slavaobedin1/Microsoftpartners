function App(){
  const [tab,setTab]         = useState("resellers");
  const [resellers,setRes]   = useState(()=>gv("ms_res",INIT_RESELLERS));
  const [cons,setCons]       = useState(()=>gv("ms_cons",{}));

  const [cedu,setCedu]       = useState(()=>gv("ms_cedu",null));
  const [pcorp,setPcorp]     = useState(()=>gv("ms_pcorp",null));
  const [pedu,setPedu]       = useState(()=>gv("ms_pedu",null));

  useEffect(()=>sv("ms_res",resellers),[resellers]);
  useEffect(()=>sv("ms_cons",cons),[cons]);
  useEffect(()=>sv("ms_ccorp",ccorp),[ccorp]);
  useEffect(()=>sv("ms_cedu",cedu),[cedu]);
  useEffect(()=>sv("ms_pcorp",pcorp),[pcorp]);
  useEffect(()=>sv("ms_pedu",pedu),[pedu]);

  const eCC = ccorp||CLOUD_CORP;
  const eCE = cedu||CLOUD_EDU;
  const ePC = pcorp||PERP_CORP;
  const ePE = pedu||PERP_EDU;

  // resellers
  const [srch,setSrch]       = useState("");
  const [sel,setSel]         = useState(null);
  const [edit,setEdit]       = useState(false);
  const [ed,setEd]           = useState(null);
  const [addMode,setAddMode] = useState(false);
  const [newR,setNewR]       = useState({name:"",nameHe:"",id:"",discount:12.5,phone:"",email:"",address:"",contacts:[]});
  const [delCfm,setDelCfm]   = useState(false);

  // prices cloud
  const [pType,setPType]     = useState("corp");
  const [pModel,setPModel]   = useState("annual");
  const [pSrch,setPSrch]     = useState("");
  const [pRes,setPRes]       = useState("");

  // calc 365
  const [c365,setC365]       = useState([{type:"corp",sku:"",qty:1}]);
  const [c365r,setC365r]     = useState("");
  const [c365m,setC365m]     = useState("annual");

  // calc perp
  const [cPerp,setCPerp]     = useState([{type:"corp",sku:"",qty:1}]);
  const [cPerpX,setCPerpX]   = useState(0);

  // consumption
  const nd=new Date(), pd=new Date(nd); pd.setMonth(pd.getMonth()-1);
  const [cMon,setCMon]       = useState(`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,"0")}`);
  const [pMon,setPMon]       = useState(`${pd.getFullYear()}-${String(pd.getMonth()+1).padStart(2,"0")}`);
  const [cSrch,setCSrch]     = useState("");

  // update
  const [csvType,setCsvType] = useState("cloudCorp");
  const fileRef              = useRef();

  const getDisc = id => { const r=resellers.find(x=>x.id===id); return r?r.discount:12.5; };
  const getBase = (p,m) => m==="annual"?p.annualE:m==="monthly"?p.monthlyE:p.mthlyE;
  const getClP  = (p,m,disc) => dp(getBase(p,m), p.specialDisc!=null?p.specialDisc:disc);

  const getCV   = (id,m) => cons[`${id}_${m}`]||"";
  const setCV   = (id,m,v) => setCons(p=>({...p,[`${id}_${m}`]:v}));

  const saveEdit = () => {
    const u={...ed,discount:parseFloat(ed.discount)||0};
    setRes(p=>p.map(r=>r.id===u.id?u:r));
    setSel(u); setEdit(false); setEd(null);
  };

  const handleCsv = e => {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      const lines=ev.target.result.split("\n").map(l=>l.trim()).filter(Boolean);
      const isP=csvType.startsWith("perp");
      const parsed=[];
      lines.slice(1).forEach(line=>{
        const c=line.split(",").map(x=>x.replace(/"/g,"").trim());
        if(isP){ if(c.length>=4) parsed.push({sku:c[0],group:c[1],desc:c[2],partnerPrice:parseFloat(c[3])||0}); }
        else    { if(c.length>=5) parsed.push({sku:c[0],desc:c[1],annualE:parseFloat(c[2])||0,monthlyE:parseFloat(c[3])||0,mthlyE:parseFloat(c[4])||0}); }
      });
      if(!parsed.length){alert("לא נמצאו נתונים תקינים");return;}

                        <option value="corp">Corporate</option><option value="edu">Education</option>
                      </select>
                      <select value={item.sku} onChange={e=>setC365(p=>p.map((x,j)=>j===i?{...x,sku:e.target.value}:x))}
                        style={{flex:1,padding:6,border:"1px solid #c7d2fe",borderRadius:5,fontSize:11}}>
                        <option value="">-- בחר מוצר --</option>
                        {(item.type==="corp"?eCC:eCE).map(p=><option key={p.sku} value={p.sku}>{p.desc}</option>)}
                      </select>
                      <input type="number" min="1" value={item.qty} onChange={e=>setC365(p=>p.map((x,j)=>j===i?{...x,qty:e.target.value}:x))}
                        style={{width:60,padding:6,border:"1px solid #c7d2fe",borderRadius:5,fontSize:12,textAlign:"center"}}/>
                      <button onClick={()=>setC365(p=>p.filter((_,j)=>j!==i))} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:5,padding:"6px 8px",cursor:"pointer"}}>✕</button>
                    </div>
                    {up!=null && <div style={{marginTop:6,fontSize:12,color:"#059669"}}>
                      יחידה: {fmt(up)} · סה"כ: <strong>{fmt(up*Number(item.qty||1))}</strong>
                      {prod?.specialDisc!=null && <span style={{color:"#b45309",marginRight:8}}> (הנחה קבועה {prod.specialDisc}%)</span>}
                    </div>}
                  </div>
                );
              })}
              <button onClick={()=>setC365(p=>[...p,{type:"corp",sku:"",qty:1}])}
                style={{width:"100%",padding:10,background:"#eff6ff",color:"#0078d4",border:"1px dashed #93c5fd",borderRadius:8,cursor:"pointer",marginBottom:12}}>
                + הוסף מוצר
              </button>
              <div style={{background:"linear-gradient(135deg,#0078d4,#106ebe)",borderRadius:12,padding:16,color:"#fff",textAlign:"center"}}>
                <div style={{fontSize:13,opacity:0.85}}>סה"כ לתשלום</div>
                <div style={{fontSize:32,fontWeight:"bold"}}>{fmt(c365.reduce((sum,item)=>{
                  const all=[...eCC,...eCE];
                  const prod=all.find(p=>p.sku===item.sku);
                  if(!prod) return sum;
                  return sum+getClP(prod,c365m,c365r?getDisc(c365r):12.5)*Number(item.qty||1);
                },0))}</div>
                <div style={{fontSize:11,opacity:0.7}}>הנחה {c365r?getDisc(c365r):12.5}% מ-End User Price</div>
              </div>
            </div>
          </div>
        )}

        {/* ══ CALC PERP ══ */}
        {tab==="calcPerp" && (
          <div>
            <div style={{background:"#fff",borderRadius:12,padding:16,border:"1px solid #e0e7ff"}}>
              <div style={{fontWeight:"bold",color:"#7c3aed",fontSize:15,marginBottom:10}}>💿 מחשבון Perpetual</div>
              <div style={{background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:8,padding:"10px 12px",marginBottom:10,fontSize:12,color:"#92400e"}}>
                💡 מחיר = Partner Price פחות 2% פחות הנחה נוספת שתגדיר
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <label style={{fontSize:12,color:"#666",whiteSpace:"nowrap"}}>הנחה נוספת:</label>
                <input type="number" min="0" max="50" value={cPerpX} onChange={e=>setCPerpX(Number(e.target.value))}
                  style={{width:70,padding:"6px 8px",border:"1px solid #c7d2fe",borderRadius:6,fontSize:13,textAlign:"center"}}/>
                <span style={{fontSize:13}}>%</span>
              </div>
              {cPerp.map((item,i)=>{
                const all=[...ePC,...ePE];
                const prod=all.find(p=>p.sku===item.sku);
                const mp=prod?dp(dp(prod.partnerPrice,2),cPerpX):null;
                return (
                  <div key={i} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:10,marginBottom:8}}>
                    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                      <select value={item.type} onChange={e=>setCPerp(p=>p.map((x,j)=>j===i?{...x,type:e.target.value,sku:""}:x))}
                        style={{padding:6,border:"1px solid #c7d2fe",borderRadius:5,fontSize:11}}>
                        <option value="corp">Corporate</option><option value="edu">Education</option>
                      </select>
                      <select value={item.sku} onChange={e=>setCPerp(p=>p.map((x,j)=>j===i?{...x,sku:e.target.value}:x))}
                        style={{flex:1,padding:6,border:"1px solid #c7d2fe",borderRadius:5,fontSize:11}}>
                        <option value="">-- בחר מוצר --</option>
                        {(item.type==="corp"?ePC:ePE).map(p=><option key={p.sku} value={p.sku}>{p.desc}</option>)}
                      </select>
                      <input type="number" min="1" value={item.qty} onChange={e=>setCPerp(p=>p.map((x,j)=>j===i?{...x,qty:e.target.value}:x))}
                        style={{width:60,padding:6,border:"1px solid #c7d2fe",borderRadius:5,fontSize:12,textAlign:"center"}}/>
                      <button onClick={()=>setCPerp(p=>p.filter((_,j)=>j!==i))} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:5,padding:"6px 8px",cursor:"pointer"}}>✕</button>
                    </div>
                    {mp!=null && <div style={{marginTop:6,fontSize:12,color:"#7c3aed"}}>
                      Partner: {fmt(prod.partnerPrice)} → מחיר שלי: <strong>{fmt(mp)}</strong> · סה"כ: <strong>{fmt(mp*Number(item.qty||1))}</strong>
                    </div>}
                  </div>
                );
              })}
              <button onClick={()=>setCPerp(p=>[...p,{type:"corp",sku:"",qty:1}])}
                style={{width:"100%",padding:10,background:"#faf5ff",color:"#7c3aed",border:"1px dashed #c4b5fd",borderRadius:8,cursor:"pointer",marginBottom:12}}>
                + הוסף מוצר
              </button>
              <div style={{background:"linear-gradient(135deg,#7c3aed,#6d28d9)",borderRadius:12,padding:16,color:"#fff",textAlign:"center"}}>
                <div style={{fontSize:13,opacity:0.85}}>סה"כ לתשלום</div>
                <div style={{fontSize:32,fontWeight:"bold"}}>{fmt(cPerp.reduce((sum,item)=>{
                  const all=[...ePC,...ePE];
                  const prod=all.find(p=>p.sku===item.sku);
                  if(!prod) return sum;
                  return sum+dp(dp(prod.partnerPrice,2),cPerpX)*Number(item.qty||1);
                },0))}</div>
                <div style={{fontSize:11,opacity:0.7}}>2% הנחה Partner + {cPerpX}% נוספת</div>
              </div>
            </div>
          </div>
        )}

        {/* ══ CONSUMPTION ══ */}
        {tab==="consumption" && (
          <div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              <div><label style={{fontSize:12,color:"#666",display:"block"}}>חודש נוכחי</label>
                <input type="month" value={cMon} onChange={e=>setCMon(e.target.value)} style={{padding:"7px 10px",border:"1px solid #c7d2fe",borderRadius:7,fontSize:13}}/></div>
              <div><label style={{fontSize:12,color:"#666",display:"block"}}>חודש קודם</label>
                <input type="month" value={pMon} onChange={e=>setPMon(e.target.value)} style={{padding:"7px 10px",border:"1px solid #c7d2fe",borderRadius:7,fontSize:13}}/></div>
            </div>
            <input value={cSrch} onChange={e=>setCSrch(e.target.value)} placeholder="🔍 חפש משווק..."
              style={{width:"100%",padding:"8px 10px",border:"1px solid #c7d2fe",borderRadius:7,fontSize:13,boxSizing:"border-box",marginBottom:10}}/>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",background:"#fff",borderRadius:8,fontSize:12}}>
                <thead><tr style={{background:"#0078d4",color:"#fff"}}>
                  <th style={{padding:"8px 10px",textAlign:"right"}}>משווק</th>
                  <th style={{padding:"8px",textAlign:"center",minWidth:110}}>חודש קודם</th>
                  <th style={{padding:"8px",textAlign:"center",minWidth:110}}>חודש נוכחי</th>
                  <th style={{padding:"8px",textAlign:"center",minWidth:80}}>שינוי</th>
                </tr></thead>
                <tbody>
                  {resellers.filter(r=>r.name.toLowerCase().includes(cSrch.toLowerCase())||(r.nameHe||"").includes(cSrch)).map((r,i)=>{
                    const prev=parseFloat(getCV(r.id,pMon))||0;
                    const curr=parseFloat(getCV(r.id,cMon))||0;
                    const diff=curr-prev;
                    const pct=prev>0?((diff/prev)*100).toFixed(0):null;
                    return <tr key={r.id} style={{background:i%2===0?"#f8fafc":"#fff",borderBottom:"1px solid #e2e8f0"}}>
                      <td style={{padding:"6px 10px"}}>
                        <div style={{fontWeight:"bold"}}>{r.name}</div>
                        {r.nameHe && <div style={{fontSize:11,color:"#777"}}>{r.nameHe}</div>}
                        <div style={{fontSize:10,color:"#aaa"}}>#{r.id}</div>
                      </td>
                      <td style={{padding:"4px 6px",textAlign:"center"}}>
                        <input type="number" value={getCV(r.id,pMon)} onChange={e=>setCV(r.id,pMon,e.target.value)}
                          placeholder="0" style={{width:90,padding:4,border:"1px solid #d1d5db",borderRadius:4,textAlign:"center",fontSize:12}}/>
                      </td>
                      <td style={{padding:"4px 6px",textAlign:"center"}}>
                        <input type="number" value={getCV(r.id,cMon)} onChange={e=>setCV(r.id,cMon,e.target.value)}
                          placeholder="0" style={{width:90,padding:4,border:"1px solid #d1d5db",borderRadius:4,textAlign:"center",fontSize:12}}/>
                      </td>
                      <td style={{padding:"4px 6px",textAlign:"center"}}>
                        {(prev>0||curr>0) && <span style={{color:diff>0?"#059669":diff<0?"#dc2626":"#888",fontWeight:"bold"}}>
                          {diff>0?"▲":diff<0?"▼":"➡"} {Math.abs(diff).toFixed(0)}{pct?` (${pct}%)`:""}</span>}
                      </td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ══ UPDATE PRICES ══ */}
        {tab==="update" && (
          <div>
            <div style={{background:"#fff",borderRadius:12,padding:16,border:"1px solid #e0e7ff"}}>
              <div style={{fontWeight:"bold",color:"#0078d4",fontSize:15,marginBottom:10}}>🔄 עדכון מחירון חודשי</div>
              <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#166534"}}>
                <strong>איך לעדכן:</strong><br/>
                1. פתח את קובץ ה-Excel של המחירון החדש<br/>
                2. שמור כ-<strong>CSV</strong> (קובץ ← שמור בשם ← CSV UTF-8)<br/>
                3. בחר סוג מחירון ולחץ "בחר קובץ"
              </div>
              <label style={{fontSize:13,color:"#555",display:"block",marginBottom:6}}>סוג מחירון:</label>
              <select value={csvType} onChange={e=>setCsvType(e.target.value)}
                style={{width:"100%",padding:"8px 10px",border:"1px solid #c7d2fe",borderRadius:7,fontSize:13,marginBottom:10,boxSizing:"border-box"}}>
                <option value="cloudCorp">☁️ Cloud Corporate</option>
                <option value="cloudEdu">☁️ Cloud Education</option>
                <option value="perpCorp">📦 Perpetual Corporate</option>
                <option value="perpEdu">📦 Perpetual Education</option>
              </select>
              <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"8px 12px",fontSize:11,color:"#555",marginBottom:12}}>
                {csvType.startsWith("cloud")
                  ? "📋 פורמט CSV: sku, description, annualE, monthlyE, mthlyE"
                  : "📋 פורמט CSV: sku, group, description, partnerPrice"}
              </div>
              <input type="file" accept=".csv" ref={fileRef} onChange={handleCsv} style={{display:"none"}}/>
              <button onClick={()=>fileRef.current.click()}
                style={{background:"#0078d4",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",cursor:"pointer",fontWeight:"bold",fontSize:13}}>
                📂 בחר קובץ CSV
              </button>

              <div style={{borderTop:"1px solid #f0f4ff",paddingTop:12,marginTop:16}}>
                <div style={{fontWeight:"bold",marginBottom:8,fontSize:13}}>מצב מחירונים:</div>
                {[["cloudCorp","☁️ Cloud Corporate",ccorp,()=>setCcorp(null)],
                  ["cloudEdu","☁️ Cloud Education",cedu,()=>setCedu(null)],
                  ["perpCorp","📦 Perpetual Corporate",pcorp,()=>setPcorp(null)],
                  ["perpEdu","📦 Perpetual Education",pedu,()=>setPedu(null)]].map(([key,label,data,reset])=>(
                  <div key={key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:data?"#f0fdf4":"#f9fafb",borderRadius:6,marginBottom:6,border:data?"1px solid #bbf7d0":"1px solid #e5e7eb"}}>
                    <span style={{fontSize:12}}>{label}</span>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      {data ? <>
                        <span style={{fontSize:11,color:"#059669"}}>✅ מעודכן ({data.length} פריטים)</span>
                        <button onClick={reset} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:5,padding:"2px 8px",cursor:"pointer",fontSize:11}}>איפוס</button>
                      </> : <span style={{fontSize:11,color:"#888"}}>מקורי</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
</body>
</html>
